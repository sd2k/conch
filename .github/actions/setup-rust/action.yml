name: "Setup Rust Environment"
description: "Install cargo-binstall, cargo-nextest, mise, protoc, and Rust toolchain"

runs:
  using: "composite"
  steps:
    - name: Install protoc
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Install cargo-binstall
      shell: bash
      run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

    - name: Install cargo-nextest
      shell: bash
      # `--disable-strategies compile` forces a prebuilt binary and prevents
      # binstall from silently falling back to a source build, which fails the
      # "must use --locked" tripwire in recent cargo-nextest releases.
      run: cargo binstall --no-confirm --force --disable-strategies compile cargo-nextest

    - name: Install mise
      uses: jdx/mise-action@v3
      with:
        cache: false # We handle caching ourselves to include ~/.rustup

    - name: Install rustfmt, clippy, and wasm32-wasip2 target
      shell: bash
      run: |
        rustup component add rustfmt clippy
        rustup target add wasm32-wasip2
