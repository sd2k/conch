name: js

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: 1

permissions: {}

jobs:
  # The JS bindings are generated from the Rust shell wasm, so run on any code
  # change (js/** or crates/**), skipping only docs-only PRs. Job-level `if:`
  # keeps the required check reporting (skipped == passing).
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'js/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/js.yml'

  build:
    name: JavaScript bindings
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v2

      - name: Build and test JavaScript bindings
        working-directory: js
        run: mise run //js:test

      - name: Build browser demo
        working-directory: js
        run: mise run //js:demo-build

      # Deploy js/demo/dist to Cloudflare Pages (project: conch-demo).
      # Pushes to main publish; PRs get a per-branch preview deploy. The deploy
      # steps no-op when CLOUDFLARE_API_TOKEN is unset (forks, or before the
      # repo secrets are configured), so this job stays green either way.
      - name: Check Cloudflare credentials
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Pages deploy"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: >-
          steps.cf.outputs.ready == 'true'
          && github.event.pull_request.head.repo.fork != true
          && github.actor != 'dependabot[bot]'
          && github.ref_type != 'tag'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy js/demo/dist
            --project-name=conch-demo
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-dirty=true

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="🌐 **Demo preview:** ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          📌 **This deploy:** ${{ steps.deploy.outputs.deployment-url }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$BODY" --edit-last \
          || gh pr comment ${{ github.event.pull_request.number }} \
            --body "$BODY"
