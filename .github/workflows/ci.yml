name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: 1
  RUST_BACKTRACE: 1

jobs:
  # Detect which areas changed so we can skip the (expensive) Rust jobs on
  # PRs that only touch unrelated paths (e.g. js/** or docs). Uses job-level
  # `if:` rather than workflow-level `paths:` so the required status checks
  # still report (a skipped required check is treated as passing) — same
  # pattern as the eryx repo.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tests/**'
              - 'clis/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'mise.toml'
              - '.config/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'

  # Build conch-shell WASM component - other jobs depend on this
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - uses: ./.github/actions/setup-rust

      - name: Force rebuild (cache may have stale timestamps)
        run: |
          # Touch ALL sources to ensure mise doesn't skip build due to cached timestamps
          # The Rust cache may restore .wasm files with newer timestamps than sources
          find crates/conch-shell/src -name "*.rs" -exec touch {} +
          touch crates/conch-shell/Cargo.toml
          # Remove outputs (mise checks mtime, not existence)
          rm -f target/wasm32-wasip2/release/conch_shell.wasm

      - name: Build WASM component
        run: mise run wasm-build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/conch_shell.wasm
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/

      - uses: ./.github/actions/mark-wasm-current

      - uses: ./.github/actions/setup-rust

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/

      - uses: ./.github/actions/mark-wasm-current

      - uses: ./.github/actions/setup-rust

      - name: Build test command WASM component
        run: cargo build -p conch-test-cmd --target wasm32-wasip2 --release

      - name: Run tests
        # Use --profile ci for retries + longer timeouts on slow WASM tests.
        # This lets the conch-grpc integration tests run in CI again: they
        # race on server startup/timeouts when run concurrently with the
        # heavy WASM tests, so retries make them reliable.
        run: cargo nextest run --workspace --all-features --profile ci

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          mise_toml: |
            [tools]
            rust = "1.92"

      - name: Check MSRV
        # Only check conch core without embedded-shell feature
        # Other crates require embedded-shell which needs the WASM artifact
        run: cargo check -p conch --no-default-features

  # Validate the CLI build manifests (clis/*.toml) parse and reference existing
  # files. Cheap and toolchain-free (no wasm/Go fork), so it runs standalone and
  # catches manifest bit-rot on every PR. The actual component rebuild lives in
  # the scheduled rebuild-cli-components workflow (needs the Go toolchain, #53).
  manifests:
    name: CLI Manifests
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          mise_toml: |
            [tools]
            rust = "1.92"

      - name: Validate manifests
        run: cargo run -p conch-build -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/

      - uses: ./.github/actions/mark-wasm-current

      - uses: ./.github/actions/setup-rust

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # Run examples to ensure they don't bitrot
  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/

      - uses: ./.github/actions/mark-wasm-current

      - uses: ./.github/actions/setup-rust

      # Examples are a bitrot check, so build in dev (not release): the
      # release-opt compile dominated this job, while wasmtime stays optimized
      # via the [profile.dev.package] override. Build all examples once (one
      # parallel compile) then run the prebuilt binaries.
      - name: Build examples
        run: cargo build --package conch --examples --features embedded-shell

      - name: Run examples
        run: |
          for ex in basic vfs_mounts low_level custom_storage agent_sandbox \
                    tool_execution external_tools approval_and_policy policy_enforcement; do
            echo "=== $ex ==="
            cargo run --package conch --example "$ex" --features embedded-shell
          done

  # Test Go FFI bindings
  go-bindings:
    name: Go Bindings
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-shell
          path: target/wasm32-wasip2/release/

      - uses: ./.github/actions/mark-wasm-current

      - uses: ./.github/actions/setup-rust

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build library with embedded shell
        run: mise run build-embedded

      - name: Run Go tests
        working-directory: tests/go
        run: go test -v ./...
