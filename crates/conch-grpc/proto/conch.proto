syntax = "proto3";

package conch.v1;

// The Conch sandbox execution service.
service Sandbox {
  // Execute a shell script with bidirectional streaming for tool callbacks.
  //
  // The client sends an ExecuteRequest first, then responds to tool requests
  // from the server. The server streams back tool requests, output events,
  // and finally a result message.
  rpc Execute(stream ClientMessage) returns (stream ServerMessage);
}

// ============================================================================
// Client -> Server Messages
// ============================================================================

message ClientMessage {
  oneof msg {
    // Initial request to start execution.
    ExecuteRequest execute = 1;

    // Response to a tool invocation request from the server.
    ToolResponse tool_response = 2;
  }
}

message ExecuteRequest {
  // The shell script to execute.
  string script = 1;

  // Tools available to this execution (invokable via `tool` builtin).
  repeated ToolDeclaration tools = 2;

  // Resource limits for the execution.
  ResourceLimits limits = 3;

  // Files to write into the sandbox before execution.
  // Placed under /agent/scratch/ and accessible to the script.
  repeated SupportingFile files = 4;

  // Network configuration. If absent, networking is disabled entirely.
  NetworkConfig network_config = 5;
}

message ToolDeclaration {
  // Tool name (e.g., "prometheus_query", "list_datasources").
  string name = 1;
  // Human-readable description.
  string description = 2;
  // JSON Schema for parameters.
  string parameters_schema_json = 3;
}

message ResourceLimits {
  // Wall-clock execution timeout in milliseconds (default: 30000).
  uint64 execution_timeout_ms = 1;
  // Maximum memory in bytes (default: 64MB).
  uint64 max_memory_bytes = 2;
  // Maximum combined stdout+stderr output in bytes (default: 1MB).
  uint64 max_output_bytes = 3;
  // Maximum fuel (instruction count) for the WASM runtime (default: 10B).
  uint64 max_fuel = 4;
}

message NetworkConfig {
  // Allowed host patterns (wildcards ok). Empty = allow all non-blocked.
  repeated string allowed_hosts = 1;
  // Blocked host patterns. Checked after allowed.
  repeated string blocked_hosts = 2;
  // Maximum concurrent connections (0 = default 10).
  uint32 max_connections = 3;
  // Connection timeout in milliseconds (0 = default 30s).
  uint64 connect_timeout_ms = 4;
  // I/O read/write timeout in milliseconds (0 = default 60s).
  uint64 io_timeout_ms = 5;
}

message SupportingFile {
  // Filename (e.g., "data.json"). Written to /agent/scratch/{name}.
  string name = 1;
  // File content.
  bytes content = 2;
}

message ToolResponse {
  // Must match the request_id from ToolRequest.
  string request_id = 1;
  oneof result {
    // Successful result as JSON.
    string json_result = 2;
    // Error message.
    string error = 3;
  }
}

// ============================================================================
// Server -> Client Messages
// ============================================================================

message ServerMessage {
  oneof msg {
    // Tool invocation request (script called `tool` builtin).
    ToolRequest tool_request = 1;

    // Real-time output event.
    OutputEvent output = 2;

    // Final execution result (terminal message).
    ExecuteResult result = 3;
  }
}

message ToolRequest {
  // Unique ID for correlation with ToolResponse.
  string request_id = 1;
  // Tool name.
  string name = 2;
  // Tool parameters as JSON.
  string arguments_json = 3;
}

message OutputEvent {
  OutputStream stream = 1;
  bytes data = 2;
}

enum OutputStream {
  OUTPUT_STREAM_STDOUT = 0;
  OUTPUT_STREAM_STDERR = 1;
}

// Final execution result.
message ExecuteResult {
  // Shell exit code (0 = success).
  int32 exit_code = 1;
  // Accumulated stdout.
  string stdout = 2;
  // Accumulated stderr.
  string stderr = 3;
  // Non-empty if the sandbox itself failed (not a script error).
  string error = 4;
  // Execution statistics.
  ExecutionStats stats = 5;
}

message ExecutionStats {
  uint64 cpu_time_ms = 1;
  uint64 wall_time_ms = 2;
  uint64 peak_memory_bytes = 3;
  uint64 fuel_consumed = 4;
}
