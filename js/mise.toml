[tools]
node = "24"
# Pinned for reproducible transpile output. jco emits an invalid `const`
# reassignment (and a `for...in` over an array) in the dead-code _liftFlatRecord
# helper; rolldown rejects the const reassignment when bundling the demo, so the
# patch-js task rewrites both. Keep this pin in sync with those patches.
"npm:@bytecodealliance/jco" = "1.16.1"

# =============================================================================
# JavaScript bindings tasks (browser/Node.js via jco)
# =============================================================================

[tasks.wasm-build-small]
description = "Build WASM shell component (wasip2, size-optimized for JS)"
sources = ["../crates/conch-shell/src/**/*.rs", "../crates/conch-shell/Cargo.toml", "../crates/conch-shell/wit/**/*.wit"]
outputs = ["../target/wasm32-wasip2/release-wasm/conch_shell.wasm"]
run = """
rustup target add wasm32-wasip2
cargo build -p conch-shell --target wasm32-wasip2 --profile release-wasm --no-default-features
"""

[tasks.transpile]
description = "Transpile WASM component to JavaScript using jco"
depends = ["wasm-build-small"]
sources = ["../target/wasm32-wasip2/release-wasm/conch_shell.wasm"]
outputs = ["conch-shell/conch-shell.js", "conch-shell/conch-shell.core.wasm"]
run = """
jco transpile \
  ../target/wasm32-wasip2/release-wasm/conch_shell.wasm \
  --name conch-shell \
  --out-dir conch-shell \
  --map 'conch:shell/tools=./tool-handler.js' \
  --map wasi:cli/*=./shims/cli.js#* \
  --map wasi:clocks/*=./shims/clocks.js#* \
  --map wasi:filesystem/*=./shims/filesystem.js#* \
  --map wasi:io/*=./shims/io.js#* \
  --map wasi:random/*=./shims/random.js#*
jco types \
  --name conch-shell \
  --out-dir conch-shell \
  shell-lite.wit
"""

[tasks.patch-js]
description = "Patch generated JS (webpack node:fs/promises + jco _liftFlatRecord codegen)"
depends = ["transpile"]
sources = ["conch-shell/conch-shell.js"]
outputs = ["conch-shell/conch-shell.js"]
run = """
#!/usr/bin/env node
const fs = require('fs');
const path = 'conch-shell/conch-shell.js';
let code = fs.readFileSync(path, 'utf8');

// Patch the fetchCompile function for webpack compatibility
// Original: _fs = _fs || await import('node:fs/promises');
// Patched: wraps in try-catch and adds webpackIgnore comment
const original = `  if (isNode) {
    _fs = _fs || await import('node:fs/promises');
    return WebAssembly.compile(await _fs.readFile(url));
  }`;

const patched = `  if (isNode) {
    if (!_fs) {
      try {
        _fs = await import(/* webpackIgnore: true */ 'node:fs/promises');
      } catch {
        // Fallback for environments where node:fs/promises is unavailable
      }
    }
    if (_fs) {
      return WebAssembly.compile(await _fs.readFile(url));
    }
  }`;

if (code.includes(original)) {
  code = code.replace(original, patched);
  fs.writeFileSync(path, code);
  console.log('Patched conch-shell.js for webpack compatibility');
} else if (code.includes('webpackIgnore')) {
  console.log('conch-shell.js already patched');
} else {
  console.error('Warning: Could not find expected pattern in conch-shell.js');
  process.exit(1);
}

// Fix two bugs jco emits in the _liftFlatRecord helper:
//  1. it destructures `storagePtr` with `const` then reassigns it — rolldown
//     rejects this when bundling (and it would throw at runtime if ever hit).
//  2. it iterates the lift-fn array with `for...in` (indices) instead of
//     `for...of` (values).
// These live in dead code for this component (testpkg passes without the fix),
// but the const reassignment blocks the production bundler, so rewrite both.
// Non-fatal if absent: a future jco may fix the codegen, making this a no-op.
const liftConst = 'const { memory, useDirectParams, storagePtr, storageLen, params } = ctx;';
const liftLet = 'let { memory, useDirectParams, storagePtr, storageLen, params } = ctx;';
if (code.includes(liftConst)) {
  code = code.replace(liftConst, liftLet);
  fs.writeFileSync(path, code);
  console.log('Patched _liftFlatRecord const reassignment');
} else if (code.includes(liftLet)) {
  console.log('_liftFlatRecord const already patched');
} else {
  console.log('Note: _liftFlatRecord const pattern not found (jco may have fixed it)');
}

const liftForIn = 'for (const [key, liftFn, alignment32] in keysAndLiftFns) {';
const liftForOf = 'for (const [key, liftFn, alignment32] of keysAndLiftFns) {';
if (code.includes(liftForIn)) {
  code = code.replace(liftForIn, liftForOf);
  fs.writeFileSync(path, code);
  console.log('Patched _liftFlatRecord for...in -> for...of');
} else if (code.includes(liftForOf)) {
  console.log('_liftFlatRecord for...of already patched');
} else {
  console.log('Note: _liftFlatRecord for...in pattern not found (jco may have fixed it)');
}
"""

[tasks.build]
description = "Build JavaScript bindings (WASM + transpile + version sync)"
depends = ["patch-js"]
sources = ["conch-shell/conch-shell.js", "../Cargo.toml"]
outputs = ["conch-shell/package.json"]
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=$(cargo metadata --format-version 1 --manifest-path ../Cargo.toml | jq -r '.packages[] | select(.name == "conch-shell") | .version')
jq --arg v "$VERSION" '.version = $v' conch-shell/package.json > conch-shell/package.json.tmp
mv conch-shell/package.json.tmp conch-shell/package.json
"""

[tasks.test]
description = "Run JavaScript tests"
depends = ["build"]
sources = ["conch-shell/**/*.js", "conch-shell/**/*.wasm", "testpkg/**/*.ts"]
dir = "testpkg"
run = """
cd ../conch-shell && npm ci
cd ../testpkg && npm ci && npm run typecheck && npm run test:ci
"""

[tasks.demo-deps]
description = "Install the browser demo's dependencies (links local @bsull/conch)"
depends = ["build"]
dir = "demo"
sources = ["demo/package.json"]
outputs = ["demo/node_modules/.package-lock.json"]
run = "npm install"

[tasks.demo]
description = "Run the interactive browser demo (xterm.js + @bsull/conch) dev server"
depends = ["demo-deps"]
dir = "demo"
run = "npm run dev"

[tasks.demo-build]
description = "Build the browser demo for production (dist/)"
depends = ["demo-deps"]
dir = "demo"
run = "npm run build"

[tasks.clean]
description = "Clean JavaScript build artifacts (generated files only)"
dir = "conch-shell"
run = "rm -rf conch-shell.js conch-shell.d.ts conch-shell.core*.wasm interfaces"

[tasks.publish]
description = "Publish JavaScript package to npm"
depends = ["test"]
dir = "conch-shell"
run = "npm publish --access public"
