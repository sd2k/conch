# See https://nexte.st/docs/configuration/

# The conch-grpc integration tests each spin up a full wasmtime shell. Running
# all of them fully concurrently (with the heavy WASM tests in the rest of the
# workspace) starves CPU and trips their in-test timeouts. Bound the group to a
# few at a time — enough parallelism to be fast, capped to avoid the contention
# that (together with the generous 60s in-test timeout) caused flakes.
[test-groups.conch-grpc-serial]
max-threads = 3

[profile.default]
# Print slow tests after the run
slow-timeout = { period = "30s", terminate-after = 2 }

# Show which tests are being run
status-level = "all"

# Don't stop on first failure locally
fail-fast = false

# Number of retries for flaky tests (0 = no retries)
retries = 0

[[profile.default.overrides]]
filter = 'package(conch-grpc)'
test-group = 'conch-grpc-serial'

[profile.ci]
# CI profile with stricter settings
fail-fast = true
# Retry as a safety net; the real fix for conch-grpc flakiness is the
# serial test-group below plus the generous in-test timeouts.
retries = 2
slow-timeout = { period = "60s", terminate-after = 3 }
# Increase default timeout for slow WASM component tests
default-timeout = "120s"

[[profile.ci.overrides]]
filter = 'package(conch-grpc)'
test-group = 'conch-grpc-serial'
