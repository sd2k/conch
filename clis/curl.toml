# Build manifest for curl as a WASI (wasip2) component, via the C lane's CMake
# build system, with HTTPS over a wasm-built mbedTLS. Consumed by the
# `conch-build` driver:
#   mise run build-cli -- curl     (or end-to-end: mise run demo-curl)
# See ADR #26 and issue #79.
#
# TLS (#79 M3): mbedTLS is built as a [[deps]] library first, then curl links
# against it. mbedTLS can't get entropy/time from WASI on its own, so a small
# shim (clis/shims/mbedtls-wasi.c) provides the alt-hooks and is linked in.

name = "curl"
description = "curl (C, CMake; HTTPS via mbedTLS — #79)"
lang = "c"

[source]
repo = "https://github.com/curl/curl.git"
ref = "curl-8_20_0"
# Local working copy the driver builds from. `mise run fetch-curl` clones it.
dir = "scratch/curl"

# --- TLS backend: mbedTLS, built to wasip2 static libs before curl ---
[[deps]]
name = "mbedtls"
url = "https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-3.6.6/mbedtls-3.6.6.tar.bz2"
ref = "3.6.6"
dir = "scratch/mbedtls"
system = "cmake"
include = "include"
# Disable Unix-only modules curl doesn't need (TIMING_C / NET_C).
config_patch = "clis/patches/patch-mbedtls.sh"
# Entropy + ms-time alt-hooks (implemented by the shim below); WASI has neither
# /dev/urandom nor the POSIX-timer macros mbedTLS probes for.
cflags = [
    "-DMBEDTLS_NO_PLATFORM_ENTROPY",
    "-DMBEDTLS_ENTROPY_HARDWARE_ALT",
    "-DMBEDTLS_PLATFORM_MS_TIME_ALT",
]
cmake_flags = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DENABLE_TESTING=OFF",
    "-DENABLE_PROGRAMS=OFF",
    "-DUSE_STATIC_MBEDTLS_LIBRARY=ON",
    "-DUSE_SHARED_MBEDTLS_LIBRARY=OFF",
]
# WASI glue (mbedtls_hardware_poll / mbedtls_ms_time), linked into curl.
shims = ["clis/shims/mbedtls-wasi.c"]

[build]
system = "cmake"
# Built tool, relative to the CMake build dir → copied to component.wasm.
artifact = "src/curl"
# Patch wasi-libc gaps in the curl source before configuring (see the script).
vendor_patch = "clis/patches/patch-curl.sh"
# Compiler flags (passed via CMAKE_C_FLAGS). Each works around a WASI gap:
cflags = [
    "-DPOLLPRI=0",             # WASI poll.h lacks POLLPRI (OOB data); unused, stub to 0
    "-D_WASI_EMULATED_SIGNAL", # signal() via the wasi-sdk emulation lib
    "-mllvm", "-wasm-enable-sjlj", # setjmp.h needs LLVM sjlj lowering to compile
    "-DCURL_DISABLE_SOCKETPAIR",   # no socketpair on WASI → disable multi wakeup
]
# Linker flags (passed via CMAKE_EXE_LINKER_FLAGS). The mbedTLS shim object is
# appended automatically by the lane.
link_flags = ["-lwasi-emulated-signal", "-Wl,-z,stack-size=8388608"]
# CMake configure flags: static curl exe with TLS via mbedTLS; other optional
# deps off. The mbedTLS paths reference the [[deps]] build via placeholders.
cmake_flags = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_SHARED_LIBS=OFF",
    "-DBUILD_CURL_EXE=ON",
    "-DBUILD_LIBCURL_DOCS=OFF",
    "-DENABLE_CURL_MANUAL=OFF",
    "-DCURL_ENABLE_SSL=ON",
    "-DCURL_USE_MBEDTLS=ON",
    "-DMBEDTLS_INCLUDE_DIR={dep:mbedtls:src}/include",
    "-DMBEDTLS_LIBRARY={dep:mbedtls:build}/library/libmbedtls.a",
    "-DMBEDX509_LIBRARY={dep:mbedtls:build}/library/libmbedx509.a",
    "-DMBEDCRYPTO_LIBRARY={dep:mbedtls:build}/library/libmbedcrypto.a",
    "-DCURL_ZLIB=OFF",
    "-DCURL_BROTLI=OFF",
    "-DCURL_ZSTD=OFF",
    "-DCURL_USE_LIBPSL=OFF",
    "-DCURL_USE_LIBSSH2=OFF",
    "-DUSE_NGHTTP2=OFF",
    "-DUSE_LIBIDN2=OFF",
    "-DCURL_USE_GSSAPI=OFF",
    "-DCURL_USE_LIBUV=OFF",
    "-DCURL_DISABLE_INSTALL=ON",
    "-DENABLE_THREADED_RESOLVER=OFF",
]

[cwasm]
enabled = false

[output]
dir = "scratch/curl-component"
