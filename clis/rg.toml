# Build manifest for ripgrep (`rg`) as a WASI (wasip2) component, via the Rust
# lane. Consumed by the `conch-build` driver:
#   mise run build-cli -- rg     (or end-to-end: mise run demo-ripgrep)
# See ADR #26 and issues #85 / #84.
#
# First Rust-lane spike. ripgrep built and ran clean with no source patches or
# special flags — cargo's wasm32-wasip2 target emits a component directly. The
# default (Rust regex) build is pure Rust; mmap auto-falls-back on wasm.

name = "rg"
description = "ripgrep (Rust, wasip2)"
lang = "rust"

[source]
repo = "https://github.com/BurntSushi/ripgrep.git"
ref = "15.1.0"
# Local working copy the driver builds from. `mise run fetch-ripgrep` clones it.
dir = "scratch/ripgrep"

[build]
# cargo binary to build → artifact is rg.wasm.
bin = "rg"

[cwasm]
# Loaded as a plain component; conch compiles it per-engine on demand.
enabled = false

[output]
dir = "scratch/ripgrep-component"
