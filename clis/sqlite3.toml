# Build manifest for the SQLite CLI (`sqlite3`) as a WASI component.
# Consumed by the `conch-build` driver: `mise run build-cli -- sqlite3`
# (or end-to-end via `mise run demo-sqlite`). See ADR #26 and issue #52.
#
# First C-lane spike: a real external C CLI compiled to wasip2 via wasi-sdk's
# `wasm32-wasip2` clang, which links a component directly (no wasm-tools step).

name = "sqlite3"
description = "SQLite CLI (C, built from the amalgamation)"
lang = "c"

[source]
# Provenance: the pinned amalgamation. `mise run fetch-sqlite` downloads this
# into the (gitignored) scratch dir below; the URL is pinned in that task too.
repo = "https://www.sqlite.org/2026/sqlite-amalgamation-3530200.zip"
ref = "3.53.2"
dir = "scratch/sqlite"

[build]
# The amalgamation is just two translation units.
sources = ["shell.c", "sqlite3.c"]
# wasip2 build knobs. Each works around something WASI lacks:
cflags = [
    "-O2",
    "-D_WASI_EMULATED_SIGNAL",      # signal() (Ctrl-C handling) via emulation lib
    "-D_WASI_EMULATED_GETPID",      # getpid() via emulation lib
    "-D__minux",                    # disable the getrusage-based .timer (WASI lacks getrusage)
    "-DSQLITE_THREADSAFE=0",        # no pthreads on wasip2
    "-DSQLITE_OMIT_LOAD_EXTENSION", # no dlopen
    "-DSQLITE_DISABLE_LFS",
    "-DSQLITE_OMIT_POPEN",          # no popen()
    "-DSQLITE_NOHAVE_SYSTEM",       # no system() → drops .shell/.system meta-commands
]
# Link the wasi-sdk emulation libs the cflags above opt into.
link_flags = ["-lwasi-emulated-signal", "-lwasi-emulated-getpid"]

[cwasm]
# Loaded as a plain component; conch compiles it per-engine on demand (like gh).
enabled = false

[output]
dir = "scratch/sqlite-component"
