# Enable monorepo mode for subdirectory tasks
experimental_monorepo_root = true

[monorepo]
config_roots = ["js"]

[tools]
rust = "1.92"

# Pinned to 1.246.2: the Go (wasip3) lane targets the WASI 0.3.0-rc-2026-03-15
# snapshot (matching wasmtime 44.x); componentizing its async `wasi:cli/run`
# export needs wasm-tools >= 1.246.2. Older releases fail `component new` with
# "no export `run` found".
[tools."github:bytecodealliance/wasm-tools"]
version = "1.246.2"

# wasmtime CLI, used to pre-compile components to cwasm for fast startup.
# This MUST match the `wasmtime` crate version in Cargo.lock: cwasm is only
# loadable by an engine of the same wasmtime version (`from_cwasm` falls back
# to the slow embedded wasm on mismatch). `mise run check-wasmtime-version`
# verifies the two stay in lockstep.
[tools."aqua:bytecodealliance/wasmtime"]
version = "44.0.3"

[vars]
# wasi-sdk for the C build lane (sqlite3, #52; curl to follow in #79). Pinned
# here but deliberately NOT in [tools]: a wasm clang on PATH makes host
# proc-macro builds pick the wrong compiler. The `ensure-wasi-sdk` task installs
# it on demand; build tasks export WASI_SDK_PATH so the conch-build C lane finds
# it. (Matches eryx's pattern.)
wasi_sdk_version = "wasi-sdk-27"

# =============================================================================
# Core development tasks
# =============================================================================

[tasks.check]
description = "Run cargo check"
run = "cargo check --workspace"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.test]
description = "Run tests"
run = "cargo nextest run --workspace"

[tasks.lint]
description = "Run clippy lints"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.lint-fix]
description = "Auto-fix clippy warnings"
run = "cargo clippy --fix --allow-dirty --workspace --all-targets"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check code formatting"
run = "cargo fmt --all -- --check"

[tasks.ci]
description = "Run all CI checks"
depends = ["fmt-check", "lint", "test"]

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

# =============================================================================
# WASM shell build tasks
# =============================================================================

[tasks.wasm-target]
description = "Install wasm32-wasip2 target"
run = "rustup target add wasm32-wasip2"

[tasks.wasm-build]
description = "Build WASM shell component (wasip2)"
depends = ["wasm-target"]
sources = ["crates/conch-shell/src/**/*.rs", "crates/conch-shell/Cargo.toml", "crates/conch-shell/wit/**/*.wit"]
outputs = ["target/wasm32-wasip2/release/conch_shell.wasm"]
run = "cargo build -p conch-shell --target wasm32-wasip2 --release"

[tasks.wasm-build-small]
description = "Build WASM shell component (wasip2, size-optimized for JS bindings)"
depends = ["wasm-target"]
sources = ["crates/conch-shell/src/**/*.rs", "crates/conch-shell/Cargo.toml", "crates/conch-shell/wit/**/*.wit"]
outputs = ["target/wasm32-wasip2/release-wasm/conch_shell.wasm"]
run = "cargo build -p conch-shell --target wasm32-wasip2 --profile release-wasm"

# Embedded builds depend on `compile-shell-cwasm` (which itself depends on
# `wasm-build`) so the fast-startup cwasm is produced automatically — no manual
# compile step. `embedded()` loads the cwasm if present, else falls back to the
# embedded wasm.
[tasks.build-embedded]
description = "Build library with embedded WASM shell"
depends = ["compile-shell-cwasm"]
run = "cargo build -p conch --features embedded-shell --release"

[tasks.build-release]
description = "Build all crates in release mode (with embedded shell)"
depends = ["compile-shell-cwasm"]
run = "cargo build --workspace --features embedded-shell --release"

# =============================================================================
# Test tasks
# =============================================================================

[tasks.test-go]
description = "Run Go FFI tests"
depends = ["build-embedded"]
dir = "tests/go"
run = "go test -v ./..."

[tasks.test-all]
description = "Run all tests (Rust + Go)"
depends = ["test", "test-go"]

# =============================================================================
# MCP server tasks
# =============================================================================

[tasks.build-mcp]
description = "Build the MCP server binary"
depends = ["compile-shell-cwasm"]
run = "cargo build -p conch-mcp --features conch/embedded-shell --release"

[tasks.run-mcp]
description = "Run the MCP server (stdio transport)"
depends = ["build-mcp"]
run = "./target/release/conch-mcp"

# =============================================================================
# Documentation
# =============================================================================

[tasks.doc]
description = "Generate documentation"
run = "cargo doc --workspace --no-deps"

[tasks.doc-open]
description = "Generate and open documentation"
run = "cargo doc --workspace --no-deps --open"

# =============================================================================
# Maintenance
# =============================================================================

[tasks.msrv]
description = "Check compilation on minimum supported Rust version"
run = "cargo +1.92 check --workspace"

[tasks.check-wasmtime-version]
description = "Verify the mise-pinned wasmtime CLI matches the wasmtime crate in Cargo.lock"
run = """
#!/usr/bin/env bash
set -euo pipefail
cli=$(wasmtime --version | awk '{print $2}')
crate=$(awk '/^name = "wasmtime"$/{getline; gsub(/version = |"/,""); print; exit}' Cargo.lock)
echo "wasmtime CLI:   $cli"
echo "wasmtime crate: $crate"
if [ "$cli" != "$crate" ]; then
    echo "ERROR: version mismatch — cwasm produced by the CLI will not load in the" >&2
    echo "crate engine (from_cwasm falls back to the slow embedded wasm)." >&2
    echo "Update [tools.\\"aqua:bytecodealliance/wasmtime\\"] in mise.toml to ${crate}." >&2
    exit 1
fi
echo "OK: versions match."
"""

# =============================================================================
# Subprocess / WASI component tasks
# =============================================================================

[tasks.build-test-cmd]
description = "Build the test 'upper' command component (wasip2)"
depends = ["wasm-target"]
sources = ["crates/conch-test-cmd/src/**/*.rs"]
outputs = ["target/wasm32-wasip2/release/conch-test-cmd.wasm"]
run = "cargo build -p conch-test-cmd --target wasm32-wasip2 --release"

[tasks.build-cli]
description = "Build a CLI component from its manifest (clis/<name>.toml) via the conch-build driver. Usage: mise run build-cli -- <name|path.toml>"
run = """
#!/usr/bin/env bash
set -euo pipefail
NAME="${1:?Usage: mise run build-cli -- <name|path.toml> (e.g. gh, gcx, sqlite3)}"
# The C lane needs wasi-sdk; export WASI_SDK_PATH if it's installed (kept off
# PATH/[tools] on purpose). Don't force-install — Go-lane builds (gh) shouldn't
# pay for it. C manifests bail with a pointer to `ensure-wasi-sdk` if missing.
if SDK="$(mise where "github:WebAssembly/wasi-sdk@{{vars.wasi_sdk_version}}" 2>/dev/null)"; then
    export WASI_SDK_PATH="$SDK"
fi
cargo run -q -p conch-build -- "$NAME"
"""

[tasks.ensure-wasi-sdk]
description = "Install the pinned wasi-sdk (C build lane) if not already present"
run = """
#!/usr/bin/env bash
set -euo pipefail
SPEC="github:WebAssembly/wasi-sdk@{{vars.wasi_sdk_version}}"
if ! mise where "$SPEC" >/dev/null 2>&1; then
    echo "Installing {{vars.wasi_sdk_version}}…"
    mise install "$SPEC"
fi
SDK="$(mise where "$SPEC")"
if [ ! -x "$SDK/bin/clang" ]; then
    echo "ERROR: wasi-sdk install incomplete — $SDK/bin/clang not found" >&2
    exit 1
fi
echo "wasi-sdk ready at: $SDK"
"""

[tasks.fetch-ripgrep]
description = "Clone the pinned ripgrep source into scratch/ripgrep"
run = """
#!/usr/bin/env bash
set -euo pipefail
DIR=scratch/ripgrep
REF=15.1.0
if [ -d "$DIR/.git" ]; then
    echo "ripgrep source already present ($(git -C "$DIR" describe --tags 2>/dev/null || echo unknown))"
    exit 0
fi
echo "Cloning ripgrep @ $REF"
git clone --depth 1 --branch "$REF" https://github.com/BurntSushi/ripgrep.git "$DIR"
"""

[tasks.fetch-curl]
description = "Clone the pinned curl source into scratch/curl"
run = """
#!/usr/bin/env bash
set -euo pipefail
DIR=scratch/curl
REF=curl-8_20_0
if [ -d "$DIR/.git" ]; then
    echo "curl source already present ($(git -C "$DIR" describe --tags 2>/dev/null || echo unknown))"
    exit 0
fi
echo "Cloning curl @ $REF"
git clone --depth 1 --branch "$REF" https://github.com/curl/curl.git "$DIR"
"""

[tasks.fetch-mbedtls]
description = "Fetch the pinned mbedTLS release tarball into scratch/mbedtls (curl TLS dep)"
run = """
#!/usr/bin/env bash
set -euo pipefail
DIR=scratch/mbedtls
VER=3.6.6
URL="https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-${VER}/mbedtls-${VER}.tar.bz2"
if [ -f "$DIR/library/CMakeLists.txt" ]; then
    echo "mbedtls source already present ($(grep -m1 'define MBEDTLS_VERSION_STRING ' "$DIR/include/mbedtls/build_info.h" 2>/dev/null || echo unknown))"
    exit 0
fi
mkdir -p "$DIR"
echo "Fetching $URL"
curl -sL "$URL" | tar xj -C "$DIR" --strip-components=1
echo "Fetched mbedtls $VER"
"""

[tasks.fetch-sqlite]
description = "Fetch the pinned SQLite amalgamation source into scratch/sqlite"
run = """
#!/usr/bin/env bash
set -euo pipefail
DIR=scratch/sqlite
URL="https://www.sqlite.org/2026/sqlite-amalgamation-3530200.zip"
if [ -f "$DIR/sqlite3.c" ]; then
    echo "sqlite amalgamation already present ($(grep -m1 'define SQLITE_VERSION ' "$DIR/sqlite3.h" | awk '{print $3}'))"
    exit 0
fi
mkdir -p "$DIR"
echo "Fetching $URL"
curl -sL -o "$DIR/amalg.zip" "$URL"
unzip -o -j "$DIR/amalg.zip" -d "$DIR"
rm -f "$DIR/amalg.zip"
echo "Fetched $(grep -m1 'define SQLITE_VERSION ' "$DIR/sqlite3.h")"
"""

[tasks.list-clis]
description = "List available CLI build manifests"
run = "cargo run -q -p conch-build -- --list"

[tasks.check-clis]
description = "Validate all CLI build manifests (parse + referenced files) without building"
run = "cargo run -q -p conch-build -- --check"

[tasks.compile-shell-cwasm]
description = "Pre-compile shell to cwasm for fast startup (~0.2s vs ~2.5s)"
depends = ["wasm-build"]
sources = ["target/wasm32-wasip2/release/conch_shell.wasm"]
outputs = ["target/wasm32-wasip2/release/conch_shell.cwasm"]
run = """
wasmtime compile \
    -W epoch-interruption \
    target/wasm32-wasip2/release/conch_shell.wasm \
    -o target/wasm32-wasip2/release/conch_shell.cwasm
"""

[tasks.compile-cwasm]
description = "Pre-compile a wasm to cwasm for subprocess commands"
usage = "mise run compile-cwasm -- <input.wasm> [output.cwasm]"
run = """
#!/usr/bin/env bash
set -euo pipefail
INPUT="${1:?Usage: mise run compile-cwasm -- <input.wasm> [output.cwasm]}"
OUTPUT="${2:-${INPUT%.wasm}.cwasm}"
wasmtime compile \
    -W component-model-async -W component-model-async-builtins \
    "$INPUT" -o "$OUTPUT"
echo "Compiled: $OUTPUT ($(du -h "$OUTPUT" | cut -f1))"
"""

[tasks.setup-commands-dir]
description = "Set up /tmp/conch-cmds with upper (and gh if available)"
depends = ["build-test-cmd"]
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p /tmp/conch-cmds
cp target/wasm32-wasip2/release/conch-test-cmd.wasm /tmp/conch-cmds/upper.wasm
# Copy gh if available
for f in scratch/gh-component/gh.cwasm scratch/gh-component/component.wasm; do
    if [ -f "$f" ]; then
        cp "$f" /tmp/conch-cmds/gh.${f##*.}
        break
    fi
done
echo "Commands dir ready:"
ls -lh /tmp/conch-cmds/
"""

[tasks.setup-gh-sandbox]
description = "Set up /tmp/gh-root sandbox (config, certs, DNS) for gh CLI"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p /tmp/gh-root/etc/ssl/certs /tmp/gh-root/etc/ca-certificates/extracted
# DNS — use real upstream, not systemd stub
REAL_DNS=$(resolvectl status 2>/dev/null | grep 'DNS Servers:' | grep -v Fallback | head -1 | awk '{print $NF}')
echo "nameserver ${REAL_DNS:-8.8.8.8}" > /tmp/gh-root/etc/resolv.conf
cp /etc/hosts /tmp/gh-root/etc/hosts 2>/dev/null || true
# TLS certs — resolve symlinks (WASI doesn't follow them)
CERT=$(readlink -f /etc/ssl/certs/ca-certificates.crt 2>/dev/null || echo /etc/ssl/certs/ca-certificates.crt)
cp "$CERT" /tmp/gh-root/etc/ssl/certs/ca-certificates.crt
cp "$CERT" /tmp/gh-root/etc/ca-certificates/extracted/tls-ca-bundle.pem
# gh config
if [ -d "$HOME/.config/gh" ]; then
    mkdir -p "/tmp/gh-root${HOME}/.config/gh"
    cp "$HOME/.config/gh/config.yml" "/tmp/gh-root${HOME}/.config/gh/" 2>/dev/null || true
    cp "$HOME/.config/gh/hosts.yml" "/tmp/gh-root${HOME}/.config/gh/" 2>/dev/null || true
fi
echo "Sandbox root ready:"
find /tmp/gh-root -type f
"""

[tasks.test-subprocess]
description = "Run subprocess integration tests"
depends = ["wasm-build", "build-test-cmd"]
run = "cargo test --test subprocess -p conch --features embedded-shell"

[tasks.demo]
description = "Demo: echo hello | upper"
depends = ["wasm-build", "build-test-cmd", "compile-shell-cwasm", "setup-commands-dir"]
run = 'cargo run -p conch-cli -- --commands-dir /tmp/conch-cmds -c "echo hello world | upper"'

[tasks.demo-gh]
description = "Demo: gh pr list | upper (needs setup-gh-sandbox first)"
depends = ["wasm-build", "compile-shell-cwasm", "setup-commands-dir", "setup-gh-sandbox"]
run = 'cargo run -p conch-cli -- --commands-dir /tmp/conch-cmds --sandbox-root /tmp/gh-root -c "gh pr list -R cli/cli --limit 3 | upper"'

[tasks.demo-sqlite]
description = "Demo: build sqlite3 (C lane) and run a query through conch (#52)"
depends = ["ensure-wasi-sdk", "fetch-sqlite", "wasm-build", "compile-shell-cwasm", "build-test-cmd"]
run = """
#!/usr/bin/env bash
set -euo pipefail
export WASI_SDK_PATH="$(mise where "github:WebAssembly/wasi-sdk@{{vars.wasi_sdk_version}}")"
cargo run -q -p conch-build -- sqlite3
mkdir -p /tmp/conch-cmds
cp scratch/sqlite-component/component.wasm /tmp/conch-cmds/sqlite3.wasm
cp target/wasm32-wasip2/release/conch-test-cmd.wasm /tmp/conch-cmds/upper.wasm
echo "--- sqlite3 :memory: piped through upper ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds \
    -c "sqlite3 :memory: \\"SELECT 'hello from sqlite ' || sqlite_version()\\" | upper"
"""

[tasks.demo-ripgrep]
description = "Demo: build ripgrep (Rust lane) and search a mounted dir through conch (#85)"
depends = ["wasm-target", "fetch-ripgrep", "wasm-build", "compile-shell-cwasm", "build-test-cmd"]
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo run -q -p conch-build -- rg
mkdir -p /tmp/conch-cmds /tmp/rg-root/proj
cp scratch/ripgrep-component/component.wasm /tmp/conch-cmds/rg.wasm
cp target/wasm32-wasip2/release/conch-test-cmd.wasm /tmp/conch-cmds/upper.wasm
printf 'fn main() {\\n    println!("hi");\\n}\\n' > /tmp/rg-root/proj/a.rs
printf 'TODO: ship it\\n' > /tmp/rg-root/proj/b.txt
echo "--- rg -n main /proj ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds --sandbox-root /tmp/rg-root \
    -c "rg -n main /proj"
echo "--- rg -n TODO /proj | upper ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds --sandbox-root /tmp/rg-root \
    -c "rg -n TODO /proj | upper"
"""

[tasks.demo-curl]
description = "Demo: build curl + mbedTLS (C/CMake lane) and fetch HTTPS through conch (#79)"
depends = ["ensure-wasi-sdk", "fetch-curl", "fetch-mbedtls", "wasm-build", "compile-shell-cwasm"]
run = """
#!/usr/bin/env bash
set -euo pipefail
export WASI_SDK_PATH="$(mise where "github:WebAssembly/wasi-sdk@{{vars.wasi_sdk_version}}")"
cargo run -q -p conch-build -- curl
mkdir -p /tmp/conch-cmds
cp scratch/curl-component/component.wasm /tmp/conch-cmds/curl.wasm
# Sandbox with the resolved CA bundle (WASI doesn't follow symlinks).
CERT=$(readlink -f /etc/ssl/certs/ca-certificates.crt 2>/dev/null || echo /etc/ssl/certs/ca-certificates.crt)
mkdir -p /tmp/curl-tls-root/etc/ssl/certs
cp "$CERT" /tmp/curl-tls-root/etc/ssl/certs/ca-certificates.crt
echo "--- curl --version (M1) ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds -c "curl --version"
echo "--- curl -sSI http://example.com (M2, plaintext) ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds -c "curl -sSI http://example.com"
echo "--- curl HTTPS with cert verification (M3, mbedTLS) ---"
cargo run -q -p conch-cli -- --commands-dir /tmp/conch-cmds --sandbox-root /tmp/curl-tls-root \
    -c "curl -sSI --cacert /etc/ssl/certs/ca-certificates.crt https://example.com"
"""
